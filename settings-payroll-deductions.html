<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento - Payroll deductions settings</title>
  <meta name="description" content="Talento HR Platform - Payroll deductions & contributions settings screen" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="design-tokens.js"></script>
  <style>
    /* ── Page background ─────────────────────────────────── */
    #main-scroll { background: #f6f5f7; }

    /* ── Settings shell layout ───────────────────────────── */
    .set-shell {
      display: grid;
      grid-template-columns: 272px 1fr;
      min-height: calc(100vh - 56px);
      background: #f6f5f7;
      transition: grid-template-columns 300ms ease;
    }
    .set-shell.is-settings-panel-hidden { grid-template-columns: 1fr; }
    .set-shell.is-settings-panel-hidden #settings-side-panel { display: none; }

    /* ── Settings secondary sidebar ─────────────────────── */
    #settings-side-panel {
      border-right: 1px solid #e8e7eb;
      background: #f6f5f7;
      min-width: 0;
      transition: width 300ms ease, opacity 300ms ease;
    }
    #settings-side-panel.is-primary-collapsed {
      width: 0;
      min-width: 0;
      opacity: 0;
      overflow: hidden;
      border-right: none;
    }

    .set-side-wrap { height: 100%; display: flex; flex-direction: column; gap: 14px; padding: 16px 14px; min-width: 0; }
    .set-side-head h2 { margin: 0 0 10px; color: #1e1033; font-size: 20px; line-height: 1.3; font-weight: 500; }
    .set-side-search-fallback { width: 100%; height: 36px; border-radius: 999px; border: 1px solid #e2dde9; padding: 0 12px; font-size: 14px; color: #4b405c; font-family: 'Alexandria', Helvetica, sans-serif; background: #fff; }
    .set-side-head .search-input-wrap { height: 36px !important; border-radius: 999px !important; background: #fff !important; border: 1px solid #e2dde9 !important; }
    .set-side-scroll { display: grid; gap: 18px; overflow-y: auto; padding-right: 2px; }
    .set-side-group-title { margin: 0 0 10px; color: #787085; font-size: 12px; font-weight: 500; line-height: 1.2; }
    .set-side-group-list { display: grid; gap: 4px; }
    .set-side-item-block { display: grid; gap: 2px; }
    .set-side-item { width: 100%; min-height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; color: #1e1033; font-size: 14px; background: transparent; border: none; font-family: 'Alexandria', Helvetica, sans-serif; text-decoration: none; }
    .set-side-item-main { display: inline-flex; align-items: center; gap: 10px; white-space: nowrap; }
    .set-side-item i { color: #4b405c; }
    .set-side-item .fa-chevron-down { transition: transform 150ms ease; transform: rotate(0deg); }
    .set-side-item .fa-chevron-down.is-open { transform: rotate(180deg); }
    .set-side-item.is-active { background: #ece9f2; }
    .set-side-item.is-active .set-side-item-main span,
    .set-side-item.is-active .set-side-item-main i,
    .set-side-item.is-active > i { color: #4B405C; }
    .set-side-item:hover:not(.is-active) { background: rgba(236, 233, 239, 0.55); }
    .set-side-children { display: none; margin-left: 12px; padding-left: 12px; border-left: 1px solid #e8e7eb; gap: 2px; }
    .set-side-children.is-open { display: grid; }
    .set-side-child { min-height: 34px; border-radius: 8px; display: inline-flex; align-items: center; padding: 0 10px; background: transparent; color: #4b405c; font-size: 14px; text-decoration: none; }
    .set-side-child.is-active { background: #ece9f2; color: #1e1033; font-weight: 500; }
    .set-side-child:hover:not(.is-active) { background: rgba(236, 233, 239, 0.55); }

    /* ── Main content area ───────────────────────────────── */
    #settings-main-root { min-width: 0; padding: 20px; position: relative; }
    .payroll-main-inner { max-width: 920px; display: grid; gap: 16px; }

    /* ── Breadcrumb ──────────────────────────────────────── */
    .org-breadcrumb { margin: 0; color: #787085; font-size: 14px; line-height: 1.4; }
    .org-breadcrumb-sep { color: #787085; }
    .org-breadcrumb-current { color: #4B405C; }

    /* ── Page intro header ───────────────────────────────── */
    .org-page-intro { display: flex; align-items: center; gap: 14px; }
    .org-page-icon { width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(160deg, #d7b6ff 0%, #ac7ef3 100%); display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; flex-shrink: 0; }
    .org-page-title { margin: 0; color: #1e1033; font-size: 20px; line-height: 1.3; font-weight: 500; }
    .org-page-subtitle { margin: 2px 0 0; color: #787085; font-size: 14px; line-height: 1.4; }

    /* ── Tabs ────────────────────────────────────────────── */
    .payroll-tabs-wrap {
      border-bottom: 1px solid #e8e7eb;
      display: flex;
      align-items: center;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 1px;
      scrollbar-width: thin;
    }
    .payroll-tab-btn {
      min-height: 42px;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: #787085;
      font-size: 14px;
      font-family: 'Alexandria', Helvetica, sans-serif;
      white-space: nowrap;
      padding: 0;
      cursor: pointer;
    }
    .payroll-tab-btn.is-active {
      color: #1e1033;
      border-bottom-color: #1e1033;
      font-weight: 500;
    }

    /* ── Deductions card ─────────────────────────────────── */
    .deduction-card {
      background: #fff;
      border: 1px solid #e8e7eb;
      border-radius: 20px;
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .deduction-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .deduction-card-title {
      margin: 0;
      color: #1e1033;
      font-size: 20px;
      line-height: 1.3;
      font-weight: 500;
    }

    .deduction-card-subtitle {
      margin: 4px 0 0;
      color: #787085;
      font-size: 14px;
      line-height: 1.4;
    }

    .deduction-manage-btn {
      flex-shrink: 0;
      min-height: 36px;
      border-radius: 10px;
      border: 1px solid #1E10331A;
      box-shadow: inset 0 0 0 1px #1E10330A;
      background: #F3F1F4;
      color: #1e1033;
      font-size: 14px;
      font-family: 'Alexandria', Helvetica, sans-serif;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    .deduction-manage-btn i { color: #4b405c; font-size: 13px; }
    .deduction-manage-btn:hover { background: #ece9f2; }

    /* ── Deduction rows ──────────────────────────────────── */
    .deduction-rows { display: grid; gap: 8px; }

    .deduction-row {
      border: 1px solid #ece9ef;
      border-radius: 12px;
      background: #fbfbfc;
      min-height: 58px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .deduction-row-title {
      margin: 0;
      color: #1e1033;
      font-size: 14px;
      line-height: 1.35;
      font-weight: 500;
    }

    .deduction-row-desc {
      margin: 2px 0 0;
      color: #787085;
      font-size: 14px;
      line-height: 1.35;
    }

    /* Toggle control */
    .deduction-toggle {
      width: 32px;
      height: 20px;
      border-radius: 999px;
      border: none;
      background: #d7d1e3;
      padding: 2px;
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      flex-shrink: 0;
      cursor: pointer;
    }
    .deduction-toggle span {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      display: block;
      transition: transform 150ms ease;
    }
    .deduction-toggle.is-on {
      background: #1e1033;
      justify-content: flex-end;
    }

    /* Input with unit control */
    .deduction-input-group {
      display: inline-flex;
      align-items: center;
      border: 1px solid #1E10331A;
      border-radius: 10px;
      background: #E8E7EB33;
      overflow: hidden;
      flex-shrink: 0;
    }
    .deduction-input {
      width: 52px;
      min-height: 36px;
      border: none;
      background: transparent;
      padding: 0 8px 0 12px;
      font-size: 14px;
      font-family: 'Alexandria', Helvetica, sans-serif;
      color: #1e1033;
      text-align: left;
      outline: none;
      -moz-appearance: textfield;
    }
    .deduction-input::-webkit-outer-spin-button,
    .deduction-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .deduction-input-unit {
      padding: 0 12px 0 4px;
      font-size: 14px;
      color: #787085;
      font-family: 'Alexandria', Helvetica, sans-serif;
      white-space: nowrap;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      border-left: 1px solid #e8e7eb;
    }

    /* ── Footer actions ──────────────────────────────────── */
    #settings-footer-root {
      flex-shrink: 0;
    }
    .payroll-footer-bar {
      display: flex;
      justify-content: flex-end;
      padding: 8px 20px;
      background: #F3F1F4;
      border-top: 1px solid #1E10331A;
    }
    .payroll-footer-actions { display: inline-flex; align-items: center; gap: 12px; }
    .payroll-discard-btn,
    .payroll-save-btn {
      min-height: 42px;
      border-radius: 12px;
      padding: 0 18px;
      font-size: 14px;
      font-family: 'Alexandria', Helvetica, sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #1E10331A;
      box-shadow: inset 0 0 0 1px #1E10330A;
      background: #F3F1F4;
      color: #4b405c;
      cursor: pointer;
    }
    .payroll-save-btn {
      background: #1e1033;
      border-color: #1e1033;
      box-shadow: none;
      color: #fff;
    }
    .payroll-save-btn i { color: #2CF7B3; }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 1024px) {
      .set-shell { grid-template-columns: 1fr; }
      #settings-side-panel {
        position: fixed;
        top: 56px; left: 0; bottom: 0;
        width: 272px;
        border-right: 1px solid #e8e7eb;
        border-bottom: none;
        z-index: 35;
        overflow-y: auto;
        transform: translateX(0);
        opacity: 1;
        transition: transform 250ms ease, opacity 250ms ease;
        box-shadow: 6px 0 16px rgba(30, 16, 51, 0.08);
      }
      .set-shell.is-settings-panel-hidden #settings-side-panel {
        display: block;
        transform: translateX(-100%);
        opacity: 0;
        pointer-events: none;
      }
      .payroll-main-inner { max-width: 100%; }
      .payroll-footer-bar { padding: 8px 12px; }
    }

    @media (max-width: 820px) {
      #settings-main-root { padding: 14px 12px 70px; }
      .set-side-wrap { padding: 14px 12px; }
      .org-page-intro { align-items: flex-start; }
      .deduction-row {
        align-items: flex-start;
        flex-direction: column;
      }
      .payroll-footer-actions {
        width: 100%;
        justify-content: space-between;
      }
      .payroll-discard-btn,
      .payroll-save-btn {
        flex: 1 1 0;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="overlay" aria-hidden="true"></div>
  <aside id="sidebar" aria-label="Main navigation"></aside>
  <div id="main-col">
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;background:#fff;border-bottom:1px solid #e8e7eb;flex-shrink:0;min-width:0;"></header>
    <div id="main-scroll">
      <div class="set-shell">
        <aside id="settings-side-panel" aria-label="Settings navigation"></aside>
        <main id="settings-main-root" aria-label="Payroll deductions settings content"></main>
      </div>
    </div>
    <footer id="settings-footer-root"></footer>
  </div>
</div>

<!-- Shared layout: primary sidebar + navbar -->
<script src="layout.js"></script>
<script src="leave_components.js"></script>

<!-- Shared settings: secondary sidebar + navigation config -->
<script src="settings_overview_components.js"></script>
<script src="settings_sidebar_shell.js"></script>
<script src="settings_navigation_config.js"></script>

<!-- Shared settings components reused across pages -->
<script src="settings_organization_details_components.js"></script>
<script src="settings_payroll_finance_components.js"></script>

<!-- Page-specific components and screen controller -->
<script src="settings_payroll_deductions_components.js"></script>
<script src="settings_payroll_deductions_screen.js"></script>
</body>
</html>

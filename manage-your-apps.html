<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento - Manage Your Apps</title>
  <meta name="description" content="Talento HR Platform - Manage your apps" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="design-tokens.js"></script>

  <style>
    #main-scroll { background: #f6f5f7; }
    .ma-page-wrap { padding: 16px; min-height: calc(100vh - 56px); }
    .ma-breadcrumb {
      font-size: 14px;
      line-height: 1.35;
      color: #8f88a0;
      margin-bottom: 8px;
    }
    .ma-title {
      font-size: 20px;
      line-height: 1.3;
      color: #1e1033;
      font-weight: 500;
      margin-bottom: 14px;
    }
    .ma-search {
      width: min(100%, 440px);
      height: 34px;
      border: 1px solid #ddd8e6;
      border-radius: 999px;
      background: #fff;
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .ma-search-icon {
      color: #8f88a0;
      font-size: 13px;
      flex-shrink: 0;
    }
    .ma-search input {
      width: 100%;
      border: none;
      background: transparent;
      font-size: 14px;
      color: #4b405c;
      outline: none;
    }
    .ma-search input::placeholder { color: #8f88a0; }

    .ma-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      align-items: stretch;
      max-width: 100%;
    }

    .ma-card {
      border: 1px solid #e2deea;
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
      min-height: 118px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .ma-card-top {
      min-height: 68px;
      padding: 10px 10px 9px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .ma-app-logo-wrap {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid #ece9ef;
      background: #fff;
      flex-shrink: 0;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .ma-app-logo-svg {
      width: 100%;
      height: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .ma-app-logo-svg svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .ma-app-logo {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      object-fit: cover;
      border: none;
      background: transparent;
      flex-shrink: 0;
    }

    .ma-app-name,
    .ma-app-desc,
    .ma-btn {
      font-size: 14px;
      line-height: 1.35;
    }

    .ma-app-name {
      color: #1e1033;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .ma-app-desc {
      color: #787085;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 38px;
    }

    .ma-card-bottom {
      min-height: 40px;
      border-top: 1px solid #ece9ef;
      padding: 7px 8px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .ma-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ma-btn {
      min-height: 22px;
      border-radius: 8px;
      border: 1px solid #ddd8e6;
      background: #fff;
      color: #4b405c;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
    }

    .ma-btn.detail {
      background: #1e1033;
      border-color: #1e1033;
      color: #fff;
    }

    .ma-btn.detail span:last-child {
      color: #2cf7b3;
    }

    .ma-switch {
      width: 22px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid #ddd8e6;
      background: #ece9ef;
      position: relative;
      flex-shrink: 0;
    }

    .ma-switch-thumb {
      position: absolute;
      top: 1px;
      left: 1px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      transition: transform 150ms ease;
    }

    .ma-switch.on {
      background: #1e1033;
      border-color: #1e1033;
    }

    .ma-switch.on .ma-switch-thumb {
      transform: translateX(8px);
    }

    @media (max-width: 1080px) {
      .ma-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 760px) {
      .ma-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
<div id="app">
  <div id="overlay" aria-hidden="true"></div>
  <aside id="sidebar" aria-label="Main navigation"></aside>
  <div id="main-col">
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;background:#fff;border-bottom:1px solid #e8e7eb;flex-shrink:0;min-width:0;"></header>
    <div id="main-scroll">
      <div class="ma-page-wrap">
        <div id="manage-apps-root"></div>
      </div>
    </div>
  </div>
</div>

<script src="layout.js"></script>
<script src="manage_apps_components.js"></script>
<script src="manage_apps_screen.js"></script>
</body>
</html>

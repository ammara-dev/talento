<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento - Attendance authentication</title>
  <meta name="description" content="Talento HR Platform - Attendance authentication screen" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="design-tokens.js"></script>
  <style>
    /* Page background */
    #main-scroll {
      background: radial-gradient(circle at top right, #f5f1ff 0%, #f4f8ff 40%, #f7f6fb 100%);
    }

    .att-shell {
      min-height: calc(100vh - 56px);
      padding: 22px 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .att-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .att-page-title {
      margin: 0;
      color: #1e1033;
      font-size: 20px;
      font-weight: 500;
      line-height: 1.3;
    }

    .att-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .att-action-btn {
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid #e8e7eb;
      background: #fff;
      color: #4b405c;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-family: 'Alexandria', Helvetica, sans-serif;
      box-shadow: 0 1px 2px rgba(30, 16, 51, 0.04);
      white-space: nowrap;
    }

    .att-action-btn.is-active {
      border-color: #1e1033;
      color: #1e1033;
      background: #f4f1ff;
    }

    .att-card-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .att-auth-card {
      width: min(560px, 100%);
      background: #fff;
      border-radius: 24px;
      border: 1px solid #eee8f6;
      padding: 22px 26px 26px;
      box-shadow: 0 16px 32px rgba(30, 16, 51, 0.08);
    }

    .att-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #4b405c;
      font-size: 14px;
      font-family: 'Alexandria', Helvetica, sans-serif;
      cursor: pointer;
    }

    .att-card-body {
      margin-top: 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .att-greeting {
      margin: 0;
      color: #787085;
      font-size: 14px;
      line-height: 1.4;
    }

    .att-card-title {
      margin: 0;
      color: #1e1033;
      font-size: 20px;
      font-weight: 500;
      line-height: 1.3;
    }

    .att-card-subtitle {
      margin: 0;
      color: #787085;
      font-size: 14px;
      line-height: 1.4;
    }

    .att-otp-group {
      margin: 16px 0 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .att-otp-input {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      border: 1px solid #e8e7eb;
      background: #fbfafc;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: #1e1033;
      font-family: 'Alexandria', Helvetica, sans-serif;
    }

    .att-continue-btn {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      border: none;
      background: #1e1033;
      color: #fff;
      font-size: 14px;
      font-family: 'Alexandria', Helvetica, sans-serif;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(30, 16, 51, 0.18);
    }

    .att-continue-btn i { color: #2cf7b3; }

    @media (max-width: 900px) {
      .att-shell { padding: 18px 16px 28px; }
      .att-otp-input { width: 44px; height: 44px; }
    }

    @media (max-width: 640px) {
      .att-shell { padding: 16px 12px 24px; }
      .att-auth-card { padding: 20px; }
      .att-otp-group { gap: 8px; }
      .att-otp-input { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="overlay" aria-hidden="true"></div>
  <aside id="sidebar" aria-label="Main navigation"></aside>
  <div id="main-col">
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;background:#fff;border-bottom:1px solid #e8e7eb;flex-shrink:0;min-width:0;"></header>
    <div id="main-scroll">
      <main class="att-shell" aria-label="Attendance authentication">
        <div class="att-header">
          <h1 class="att-page-title">Attendance</h1>
          <div class="att-actions" id="attendance-action-row"></div>
        </div>
        <div class="att-card-wrap" id="attendance-auth-root"></div>
      </main>
    </div>
  </div>
</div>

<script src="layout.js"></script>
<script src="attendance_authentication_components.js"></script>
<script src="attendance_authentication_screen.js"></script>
</body>
</html>

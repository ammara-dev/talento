<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento - Messages Chat</title>
  <meta name="description" content="Talento HR Platform - Messages chat thread" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="design-tokens.js"></script>

  <style>
    #main-scroll {
      background: #f6f5f7;
    }

    .msg-page-wrap {
      min-height: calc(100vh - 56px);
      background: #fff;
    }

    .msg-layout {
      display: grid;
      grid-template-columns: 160px minmax(0, 1fr);
      min-height: calc(100vh - 56px);
    }

    .msg-sidebar {
      border-right: 1px solid #ece9ef;
      padding: 14px 10px 14px 12px;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg-heading,
    .msg-chat-title {
      font-size: 20px;
      line-height: 1.3;
      font-weight: 500;
      color: #1e1033;
    }

    .msg-heading {
      margin-bottom: 4px;
    }

    .msg-search {
      height: 30px;
      border: 1px solid #ddd8e6;
      border-radius: 999px;
      background: #fff;
      padding: 0 10px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .msg-search-icon {
      color: #8f88a0;
      font-size: 12px;
      flex-shrink: 0;
    }

    .msg-search input {
      width: 100%;
      border: none;
      background: transparent;
      font-size: 14px;
      color: #4b405c;
      outline: none;
    }

    .msg-search input::placeholder {
      color: #8f88a0;
    }

    .msg-quick-list,
    .msg-group-list {
      display: grid;
      gap: 3px;
    }

    .msg-quick-item,
    .msg-channel-item,
    .msg-dm-item {
      height: 28px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #4b405c;
      font-size: 14px;
      line-height: 1.3;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 6px;
      text-align: left;
      width: 100%;
    }

    .msg-quick-item span:first-child,
    .msg-channel-icon {
      width: 12px;
      text-align: center;
      font-size: 11px;
      color: #7f7890;
      flex-shrink: 0;
    }

    .msg-group {
      margin-top: 4px;
    }

    .msg-group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }

    .msg-group-title {
      color: #a19aae;
      font-size: 11px;
      line-height: 1.3;
      letter-spacing: .3px;
      font-weight: 500;
    }

    .msg-group-plus {
      border: none;
      background: transparent;
      color: #a19aae;
      font-size: 12px;
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    .msg-dm-item.active {
      background: #f3f1f7;
    }

    .msg-row-name {
      font-size: 14px;
      line-height: 1.3;
      color: #1e1033;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msg-avatar-sm {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #e8e3f0;
      background: #f2edf8;
      flex-shrink: 0;
    }

    .msg-chat-panel {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: calc(100vh - 56px);
      background: #fff;
    }

    .msg-chat-header {
      height: 48px;
      border-bottom: 1px solid #ece9ef;
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .msg-chat-body {
      padding: 0 10px;
      min-height: 0;
    }

    .msg-chat-body-thread {
      overflow-y: auto;
      display: flex;
      align-items: flex-start;
    }

    .msgc-list {
      width: 100%;
      padding: 8px 0 14px;
      display: grid;
      gap: 8px;
    }

    .msgc-day-divider {
      position: relative;
      height: 22px;
      margin: 4px 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .msgc-day-divider::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: #ece9ef;
      transform: translateY(-50%);
      z-index: 0;
    }

    .msgc-day-text {
      position: relative;
      z-index: 1;
      background: #fff;
      padding: 0 10px;
      font-size: 14px;
      line-height: 1.3;
      color: #a19aae;
    }

    .msgc-message {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      max-width: 540px;
    }

    .msgc-avatar {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid #e8e3f0;
      background: #f2edf8;
      flex-shrink: 0;
    }

    .msgc-content {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .msgc-head {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }

    .msgc-sender,
    .msgc-time,
    .msgc-text,
    .msgc-file-name,
    .msgc-file-meta {
      font-size: 14px;
      line-height: 1.4;
    }

    .msgc-sender {
      color: #1e1033;
      font-weight: 500;
    }

    .msgc-time {
      color: #9a93a8;
    }

    .msgc-text {
      color: #1e1033;
      word-break: break-word;
    }

    .msgc-file-card {
      margin-top: 6px;
      border: 1px solid #ece9ef;
      border-radius: 10px;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: #fff;
      max-width: 250px;
    }

    .msgc-file-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .msgc-file-pill {
      min-width: 22px;
      height: 18px;
      border-radius: 6px;
      background: #ffe3e7;
      color: #dd4251;
      font-size: 10px;
      line-height: 1;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      flex-shrink: 0;
    }

    .msgc-file-name {
      color: #1e1033;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msgc-file-meta {
      color: #9a93a8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msgc-file-download {
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      color: #7f7890;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .msg-composer {
      border-top: 1px solid #ece9ef;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .msg-composer-input {
      width: 100%;
      height: 34px;
      border: 1px solid #ddd8e6;
      border-radius: 8px;
      padding: 0 10px;
      font-size: 14px;
      line-height: 1.3;
      color: #1e1033;
      outline: none;
    }

    .msg-composer-input::placeholder {
      color: #9a93a8;
    }

    .msg-composer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .msg-composer-tools {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .msg-tool-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: #7f7890;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }

    .msg-send-btn {
      min-height: 24px;
      border-radius: 8px;
      border: 1px solid #ece9ef;
      background: #f2eaff;
      color: #7f47db;
      font-size: 14px;
      line-height: 1;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }

    @media (max-width: 900px) {
      .msg-layout {
        grid-template-columns: 1fr;
      }

      .msg-sidebar {
        border-right: none;
        border-bottom: 1px solid #ece9ef;
      }
    }
  </style>
</head>

<body>
<div id="app">
  <div id="overlay" aria-hidden="true"></div>
  <aside id="sidebar" aria-label="Main navigation"></aside>

  <div id="main-col">
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;background:#fff;border-bottom:1px solid #e8e7eb;flex-shrink:0;min-width:0;"></header>
    <div id="main-scroll">
      <div class="msg-page-wrap">
        <div id="messages-chat-root"></div>
      </div>
    </div>
  </div>
</div>

<script src="layout.js"></script>
<script src="messages_components.js"></script>
<script src="messages_chat_components.js"></script>
<script src="messages_chat_screen.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento - Surveys</title>
  <meta name="description" content="Talento HR Platform - Surveys list screen" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="design-tokens.js"></script>
  <style>
    /* ── Page background ─────────────────────────────────── */
    #main-scroll { background: #fff; }

    /* ── Page wrapper ────────────────────────────────────── */
    #surveys-root {
      padding: 24px 28px 40px;
      max-width: 1200px;
      width: 100%;
      display: grid;
      gap: 0;
    }

    /* ── Page header ─────────────────────────────────────── */
    .svl-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    .svl-page-title {
      margin: 0;
      color: #1e1033;
      font-size: 20px;
      font-weight: 500;
      line-height: 1.3;
      font-family: 'Alexandria', Helvetica, sans-serif;
    }
    .svl-create-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 0 16px;
      border-radius: 10px;
      background: transparent;
      color: #1e1033;
      font-size: 14px;
      font-family: 'Alexandria', Helvetica, sans-serif;
      font-weight: 500;
      text-decoration: none;
      white-space: nowrap;
      border: 1px solid rgba(30,16,51,0.1);
      box-shadow: inset 0 0 0 1px rgba(30,16,51,0.04);
      cursor: pointer;
      transition: background 150ms ease;
    }
    .svl-create-btn:hover { background: rgba(30,16,51,0.04); }

    /* ── Tab bar ─────────────────────────────────────────── */
    .svl-tabs-bar {
      display: flex;
      align-items: center;
      gap: 0;
      border-bottom: 1.5px solid #e8e7eb;
      margin-bottom: 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .svl-tabs-bar::-webkit-scrollbar { display: none; }
    .svl-tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 42px;
      padding: 0 4px;
      margin-right: 20px;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: #787085;
      font-size: 14px;
      font-family: 'Alexandria', Helvetica, sans-serif;
      white-space: nowrap;
      cursor: pointer;
      transition: color 150ms ease, border-color 150ms ease;
    }
    .svl-tab.is-active {
      color: #1e1033;
      border-bottom-color: #1e1033;
      font-weight: 500;
    }
    .svl-tab:hover:not(.is-active) { color: #4b405c; }

    /* ── Toolbar (search + filters) ─────────────────────── */
    .svl-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .svl-search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 280px;
      height: 38px;
      border: 1px solid #e8e7eb;
      border-radius: 100px;
      padding: 0 14px;
      background: #fff;
    }
    .svl-search-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 14px;
      font-family: 'Alexandria', Helvetica, sans-serif;
      color: #1e1033;
      outline: none;
    }
    .svl-search-input::placeholder { color: #a09aab; }
    .svl-filter-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid #e8e7eb;
      background: #fff;
      color: #1e1033;
      font-size: 14px;
      font-family: 'Alexandria', Helvetica, sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: background 150ms ease;
    }
    .svl-filter-btn:hover { background: #f6f5f7; }
    .svl-filter-count {
      color: #787085;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Alexandria', Helvetica, sans-serif;
    }

    /* ── Status badges ───────────────────────────────────── */
    .svl-badge {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      font-family: 'Alexandria', Helvetica, sans-serif;
      white-space: nowrap;
    }
    .svl-badge--draft     { background: #f3f4f6; color: #6b7280; }
    .svl-badge--active    { background: #D7FFE7; color: #15803d; }
    .svl-badge--completed { background: #ede9f5; color: #5b21b6; }

    /* ── Table scroll wrapper ─────────────────────────────── */
    .svl-table-outer {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid #e8e7eb;
      border-radius: 16px;
    }

    /* ── Table ───────────────────────────────────────────── */
    .svl-table {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      min-width: 780px;
      width: 100%;
    }
    .svl-table-header,
    .svl-table-row {
      display: grid;
      grid-template-columns: 40px 1fr 110px 108px 108px 108px 140px;
      align-items: center;
      gap: 0;
    }
    .svl-table-header {
      background: #f6f5f7;
      border-bottom: 1px solid #e8e7eb;
      min-height: 44px;
    }
    .svl-table-row {
      border-bottom: 1px solid #f0eef3;
      min-height: 72px;
      transition: background 120ms ease;
    }
    .svl-table-row:last-child { border-bottom: none; }
    .svl-table-row:hover { background: #faf9fc; }

    /* Cells */
    .svl-th,
    .svl-td {
      padding: 0 12px;
      font-family: 'Alexandria', Helvetica, sans-serif;
    }
    .svl-th {
      color: #787085;
      font-size: 13px;
      font-weight: 400;
    }
    .svl-td { font-size: 14px; color: #1e1033; }

    .svl-col-check   { padding: 0 0 0 14px; }
    .svl-col-name    { min-width: 0; }
    .svl-col-status  {}
    .svl-col-ring    { display: flex; justify-content: center; }
    .svl-col-actions { display: flex; justify-content: flex-end; padding-right: 14px; }

    .svl-survey-name {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 14px;
      font-weight: 400;
      color: #1e1033;
      line-height: 1.4;
    }

    /* ── Circular progress ring ──────────────────────────── */
    .svl-ring-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .svl-ring-wrap {
      position: relative;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .svl-ring-wrap svg {
      position: absolute;
      top: 0; left: 0;
    }
    .svl-ring-label {
      position: relative;
      font-size: 11px;
      font-weight: 600;
      font-family: 'Alexandria', Helvetica, sans-serif;
      line-height: 1;
      z-index: 1;
    }
    .svl-ring-sublabel {
      font-size: 11px;
      color: #787085;
      font-family: 'Alexandria', Helvetica, sans-serif;
      text-align: center;
      white-space: nowrap;
      line-height: 1.2;
    }

    /* ── Action buttons ──────────────────────────────────── */
    .svl-action-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .svl-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Alexandria', Helvetica, sans-serif;
      font-weight: 500;
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
      transition: background 150ms ease;
    }
    .svl-action-btn--edit {
      border: 1px solid #e8e7eb;
      background: #fff;
      color: #1e1033;
    }
    .svl-action-btn--edit:hover { background: #f6f5f7; }
    .svl-action-btn--view {
      border: none;
      background: #1e1033;
      color: #fff;
    }
    .svl-action-btn--view:hover { background: #2a1745; }
    .svl-kebab-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid #e8e7eb;
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #4b405c;
      cursor: pointer;
      transition: background 150ms ease;
    }
    .svl-kebab-btn:hover { background: #f6f5f7; }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 1024px) {
      #surveys-root { padding: 20px 16px 32px; }
    }

    @media (max-width: 768px) {
      #surveys-root { padding: 16px 12px 32px; }
      .svl-search-wrap { width: 100%; flex: 1; }
      .svl-toolbar { flex-wrap: wrap; }
      /* Show scrollbar on tabs for mobile */
      .svl-tabs-bar { scrollbar-width: thin; }
      .svl-tabs-bar::-webkit-scrollbar { display: block; height: 3px; }
      .svl-tabs-bar::-webkit-scrollbar-thumb { background: #c9c4d4; border-radius: 99px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="overlay" aria-hidden="true"></div>
  <aside id="sidebar" aria-label="Main navigation"></aside>
  <div id="main-col">
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;background:#fff;border-bottom:1px solid #e8e7eb;flex-shrink:0;min-width:0;"></header>
    <div id="main-scroll">
      <main id="surveys-root" aria-label="Surveys list"></main>
    </div>
  </div>
</div>

<!-- Shared layout: primary sidebar + navbar -->
<script src="layout.js"></script>

<!-- Page-specific components and screen controller -->
<script src="surveys_list_components.js"></script>
<script src="surveys_list_screen.js"></script>
</body>
</html>

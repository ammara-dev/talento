<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento – Candidate Profile</title>
  <meta name="description" content="Talento HR Platform – Candidate profile" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css" />

  <style>
    .cp-top-row,
    .cp-heading-row,
    .cp-action-strip,
    .cp-stage-row,
    .cp-main-grid,
    .cp-two-col-grid { display: flex; }

    #main-scroll { background: #f6f5f7; }

    .cp-screen-shell {
      background: #fff;
      border: 1px solid #e8e7eb;
      border-radius: 16px;
      padding: 18px;
    }

    .cp-top-row { align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .cp-breadcrumb { display: flex; align-items: center; gap: 5px; font-size: 14px; color: #787085; }
    .cp-crumb-link { color: #787085; text-decoration: none; }
    .cp-crumb-link:hover { color: #4b405c; }
    .cp-crumb-current { color: #1e1033; }
    .cp-crumb-separator { color: #c3bdcf; }

    .cp-nav-inline { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #787085; }
    .cp-link-btn { display: inline-flex; align-items: center; gap: 4px; font-size: 14px; color: #4b405c; }

    .cp-heading-row { justify-content: space-between; align-items: flex-start; gap: 14px; margin-bottom: 12px; flex-wrap: wrap; }
    .cp-main-title { font-size: 20px; line-height: 1.35; color: #1e1033; font-weight: 600; letter-spacing: -0.2px; }
    .cp-title-wrap { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .cp-status-badge {
      display: inline-flex; align-items: center; height: 22px; padding: 0 10px;
      border-radius: 100px; font-size: 12px; color: #4b405c; background: #f3f4f6;
    }
    .cp-meta-row { margin-top: 6px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 14px; color: #787085; }
    .cp-meta-row strong { color: #1e1033; font-weight: 600; }
    .cp-recruiter-inline { display: inline-flex; align-items: center; gap: 6px; }
    .cp-recruiter-inline img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }

    .cp-heading-actions { display: flex; align-items: center; gap: 8px; }
    .cp-secondary-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      height: 32px; padding: 0 12px; border: 1px solid #e8e7eb; border-radius: 8px;
      font-size: 14px; color: #1e1033; background: #fff; transition: background 150ms;
    }
    .cp-secondary-btn:hover { background: #f6f5f7; }
    .cp-icon-btn {
      width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid #e8e7eb; border-radius: 8px; color: #4b405c; background: #fff;
    }

    .cp-action-strip {
      align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
      background: #f4f1ff; border: 1px solid #ece8f7; border-radius: 10px; padding: 8px; margin-bottom: 12px;
    }
    .cp-action-left { display: flex; gap: 8px; flex-wrap: wrap; }
    .cp-reject-btn,
    .cp-approve-btn {
      height: 30px; padding: 0 10px; border-radius: 8px; font-size: 14px;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .cp-reject-btn { background: #fff; border: 1px solid #e8e7eb; color: #4b405c; }
    .cp-approve-btn { background: #1e1033; color: #fff; }

    .cp-stage-row {
      align-items: center; gap: 6px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px;
    }
    .cp-stage-item { display: inline-flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .cp-stage-bullet {
      width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
      font-size: 12px; border: 1px solid #d9d4e5; color: #787085; background: #fff;
    }
    .cp-stage-item.done .cp-stage-bullet { color: #15803d; border-color: #15803d; background: #d7ffe7; }
    .cp-stage-item.active .cp-stage-bullet { color: #fff; border-color: #1e1033; background: #1e1033; }
    .cp-stage-label { font-size: 14px; color: #787085; white-space: nowrap; }
    .cp-stage-item.done .cp-stage-label,
    .cp-stage-item.active .cp-stage-label { color: #1e1033; }
    .cp-stage-line { width: 28px; height: 1px; background: #e8e7eb; flex-shrink: 0; }

    .cp-main-grid { align-items: flex-start; gap: 12px; }
    .cp-left-col { flex: 1 1 65%; min-width: 0; display: grid; gap: 12px; }
    .cp-right-col { flex: 1 1 35%; min-width: 280px; display: grid; gap: 12px; }

    .cp-card { border: 1px solid #e8e7eb; border-radius: 14px; background: #fff; overflow: hidden; }
    .cp-card-header { padding: 14px 14px 0; }
    .cp-card-header h3 { color: #1e1033; font-size: 20px; line-height: 1.3; font-weight: 600; }
    .cp-card-header p { margin-top: 2px; color: #787085; font-size: 14px; line-height: 1.35; }
    .cp-section-top {
      padding: 12px 14px; border-bottom: 1px solid #f0eef6; display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .cp-section-top h3, .cp-section-title { font-size: 20px; color: #1e1033; font-weight: 600; line-height: 1.3; }

    .cp-cv-preview { padding: 12px 14px 14px; }
    .cp-cv-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .cp-cv-header h2 { font-size: 32px; color: #1e1033; line-height: 1.1; font-weight: 500; }
    .cp-cv-header p { margin-top: 6px; font-size: 26px; color: #1e1033; line-height: 1.15; }
    .cp-cv-header img { width: 66px; height: 66px; border-radius: 50%; object-fit: cover; }
    .cp-cv-meta { margin-top: 10px; font-size: 14px; color: #787085; }
    .cp-cv-summary { margin-top: 10px; color: #4b405c; font-size: 14px; line-height: 1.6; }
    .cp-exp-list { margin-top: 10px; display: grid; gap: 8px; }
    .cp-exp-item strong { display: block; color: #1e1033; font-size: 14px; line-height: 1.35; }
    .cp-exp-item p, .cp-exp-item span { color: #787085; font-size: 14px; line-height: 1.35; }

    .cp-match-wrap { padding: 12px 14px 14px; display: flex; gap: 12px; justify-content: space-between; align-items: center; }
    .cp-tag-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .cp-tag {
      display: inline-flex; align-items: center; height: 22px; padding: 0 10px;
      border-radius: 100px; background: #ede8fb; color: #7c3aed; font-size: 12px;
    }
    .cp-donut-wrap { width: 118px; height: 118px; position: relative; flex-shrink: 0; }
    .cp-donut-wrap svg { display: block; }
    .cp-donut-label {
      position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #787085; font-size: 14px;
    }
    .cp-donut-label strong { font-size: 24px; color: #1e1033; line-height: 1; margin-top: 2px; }

    .cp-contact-list, .cp-info-list { padding: 12px 14px 14px; display: grid; gap: 8px; }
    .cp-contact-row {
      border: 1px solid #e8e7eb; border-radius: 10px; min-height: 42px; padding: 6px 8px;
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .cp-contact-value { display: inline-flex; align-items: center; gap: 6px; color: #1e1033; font-size: 14px; line-height: 1.35; }
    .cp-copy-btn {
      height: 30px; padding: 0 10px; border: 1px solid #e8e7eb; border-radius: 8px; font-size: 14px; color: #4b405c; background: #fff;
      display: inline-flex; align-items: center; gap: 5px;
    }

    .cp-info-row { padding: 8px 0; border-bottom: 1px solid #f0eef6; display: grid; gap: 4px; }
    .cp-info-row:last-child { border-bottom: none; }
    .cp-info-label { display: inline-flex; align-items: center; gap: 6px; color: #787085; font-size: 14px; }
    .cp-info-row strong { color: #1e1033; font-size: 14px; font-weight: 600; }

    .cp-two-col-grid { gap: 18px; padding: 12px 14px 14px; border-top: 1px solid #f0eef6; }
    .cp-two-col-grid > div { flex: 1; min-width: 0; }
    .cp-kv-row { padding: 7px 0; display: grid; gap: 3px; border-bottom: 1px solid #f7f5fa; }
    .cp-kv-row:last-child { border-bottom: none; }
    .cp-kv-row span { color: #787085; font-size: 14px; line-height: 1.35; }
    .cp-kv-row strong { color: #1e1033; font-size: 14px; line-height: 1.35; font-weight: 600; }

    @media (max-width: 1200px) {
      .cp-main-grid { flex-direction: column; }
      .cp-right-col { min-width: 0; width: 100%; }
    }

    @media (max-width: 900px) {
      .cp-top-row { flex-direction: column; align-items: flex-start; }
      .cp-heading-actions { width: 100%; justify-content: flex-start; }
      .cp-two-col-grid { flex-direction: column; gap: 4px; }
      .cp-cv-header h2 { font-size: 26px; }
      .cp-cv-header p { font-size: 20px; }
    }

    @media (max-width: 640px) {
      .cp-screen-shell { padding: 12px; border-radius: 12px; }
      .cp-main-title,
      .cp-card-header h3,
      .cp-section-top h3,
      .cp-section-title { font-size: 20px; }
      .cp-match-wrap { flex-direction: column; align-items: flex-start; }
      .cp-action-strip { align-items: flex-start; }
    }
  </style>
</head>
<body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento - Credits Packs</title>
  <meta name="description" content="Talento HR Platform - Credits packs" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="design-tokens.js"></script>

  <style>
    #main-scroll { background: #f6f5f7; }
    .cr-page-wrap { padding: 16px; min-height: calc(100vh - 56px); }
    .cr-shell {
      min-height: calc(100vh - 88px);
      border: 2px solid #c9b4f0;
      border-radius: 14px;
      background: #fff;
      padding: 16px;
    }

    .cr-breadcrumb {
      font-size: 14px;
      line-height: 1.35;
      color: #8f88a0;
      margin-bottom: 8px;
    }

    .cr-title {
      font-size: 20px;
      line-height: 1.3;
      color: #1e1033;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .cr-tabs {
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #ece9ef;
      margin-bottom: 20px;
      padding-bottom: 6px;
    }

    .cr-tab {
      border: none;
      background: transparent;
      color: #8f88a0;
      font-size: 14px;
      line-height: 1.3;
      padding: 0 0 6px;
      border-bottom: 2px solid transparent;
    }

    .cr-tab.active {
      color: #1e1033;
      border-bottom-color: #1e1033;
      font-weight: 500;
    }

    .crp-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      align-items: start;
      margin-top: 4px;
    }

    .crp-pack-card {
      border: 1px solid #e2ddeb;
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
    }

    .crp-pack-top {
      min-height: 72px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: linear-gradient(160deg, #f6f2fc 0%, #faf8fd 100%);
    }

    .crp-pack-label {
      font-size: 14px;
      line-height: 1.3;
      color: #5f5670;
      margin-bottom: 4px;
    }

    .crp-pack-value {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      font-size: 34px;
      line-height: 1;
      color: #1e1033;
      font-weight: 500;
      letter-spacing: -0.4px;
    }

    .crp-pack-bonus {
      font-size: 13px;
      line-height: 1.3;
      color: #8b64e4;
      font-weight: 500;
    }

    .crp-pack-deco {
      color: #d7c2fb;
      font-size: 22px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
    }

    .crp-pack-deco svg {
      width: 34px;
      height: 34px;
      display: block;
    }

    .crp-pack-bottom {
      min-height: 34px;
      padding: 6px 10px;
      border-top: 1px solid #ece9ef;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .crp-pack-price {
      font-size: 24px;
      line-height: 1;
      color: #4b405c;
      font-weight: 500;
    }

    .crp-pack-btn {
      min-height: 22px;
      border-radius: 8px;
      border: 1px solid #1e1033;
      background: #1e1033;
      color: #fff;
      font-size: 12px;
      line-height: 1;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }

    .crp-pack-btn span:last-child { color: #2cf7b3; font-size: 11px; }

    @media (max-width: 1240px) {
      .crp-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 760px) {
      .crp-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
<div id="app">
  <div id="overlay" aria-hidden="true"></div>
  <aside id="sidebar" aria-label="Main navigation"></aside>
  <div id="main-col">
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;background:#fff;border-bottom:1px solid #e8e7eb;flex-shrink:0;min-width:0;"></header>
    <div id="main-scroll">
      <div class="cr-page-wrap">
        <div id="credits-packs-root"></div>
      </div>
    </div>
  </div>
</div>

<script src="layout.js"></script>
<script src="credits_components.js"></script>
<script src="credits_packs_components.js"></script>
<script src="credits_packs_screen.js"></script>
</body>
</html>

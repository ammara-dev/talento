<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento - Attendance kiosk mode</title>
  <meta name="description" content="Talento HR Platform - Attendance kiosk mode authentication screen" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="design-tokens.js"></script>
  <style>
    /* Page background */
    #main-scroll { background: #f6f5f7; }

    .att-shell {
      min-height: calc(100vh - 56px);
      padding: 22px 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .att-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      background: #fff;
      border: 1px solid #ece9ef;
      border-radius: 16px;
      padding: 10px 14px;
    }

    .att-page-title {
      margin: 0;
      color: #1e1033;
      font-size: 20px;
      font-weight: 500;
      line-height: 1.3;
    }

    .att-actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .ac-chip-group {
      display: inline-flex;
      align-items: center;
      border: 1px solid #e2dde9;
      background: #F6F5F7;
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
      flex-wrap: wrap;
    }

    .ac-chip {
      min-height: 32px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: transparent;
      color: #5c546d;
      font-size: 14px;
      line-height: 1.3;
      font-family: 'Alexandria', Helvetica, sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .ac-chip i { color: inherit; }

    .ac-chip.is-active {
      background: #fff;
      border-color: #e2dde9;
      color: #1e1033;
    }

    .ac-config-btn {
      min-height: 32px;
      border-radius: 12px;
      border: 1px solid #e2dde9;
      background: #fff;
      color: #1e1033;
      font-size: 14px;
      line-height: 1.3;
      font-family: 'Alexandria', Helvetica, sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    .att-card-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .att-auth-card {
      width: min(720px, 100%);
      min-height: 489px;
      background: #fff;
      border-radius: 24px;
      border: 2px solid #eee8f6;
      padding: 24px 48px 32px;
      box-shadow: 0 18px 32px rgba(30, 16, 51, 0.1);
      display: flex;
      flex-direction: column;
    }

    .att-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #4b405c;
      font-size: 14px;
      font-family: 'Alexandria', Helvetica, sans-serif;
      cursor: pointer;
    }

    .att-card-body {
      margin: 18px auto 0;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 420px;
    }

    .att-greeting {
      margin: 0;
      color: #4b405c;
      font-size: 14px;
      line-height: 1.4;
      font-weight: 500;
    }

    .att-card-title {
      margin: 0;
      color: #1e1033;
      font-size: 32px;
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.5px;
    }

    .att-card-subtitle {
      margin: 0;
      color: #4b405c;
      font-size: 14px;
      line-height: 1.4;
    }

    .att-otp-group {
      margin: 24px auto 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      width: min(420px, 100%);
      height: 87px;
    }

    .att-otp-input {
      width: 71.2px;
      height: 87px;
      border-radius: 10px;
      border: 1px solid #e7e1ee;
      background: #fff;
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      color: #1e1033;
      font-family: 'Alexandria', Helvetica, sans-serif;
    }

    .att-otp-input::placeholder { color: #b4adc1; }

    .att-continue-btn {
      width: min(420px, 100%);
      min-height: 48px;
      border-radius: 12px;
      border: none;
      background: #1e1033;
      color: #fff;
      font-size: 14px;
      font-family: 'Alexandria', Helvetica, sans-serif;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(30, 16, 51, 0.2);
      align-self: center;
      text-decoration: none;
    }

    .att-continue-btn i { color: #2cf7b3; }

    @media (max-width: 900px) {
      .att-shell { padding: 18px 16px 28px; }
      .att-auth-card { padding: 22px 28px; min-height: 0; }
      .att-otp-group { height: auto; }
      .att-otp-input { width: 60px; height: 72px; }
    }

    @media (max-width: 640px) {
      .att-shell { padding: 16px 12px 24px; }
      .att-auth-card { padding: 20px; }
      .att-card-title { font-size: 26px; }
      .att-otp-group { gap: 10px; }
      .att-otp-input { width: 48px; height: 64px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="overlay" aria-hidden="true"></div>
  <aside id="sidebar" aria-label="Main navigation"></aside>
  <div id="main-col">
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;background:#fff;border-bottom:1px solid #e8e7eb;flex-shrink:0;min-width:0;"></header>
    <div id="main-scroll">
      <main class="att-shell" aria-label="Attendance kiosk mode">
        <div class="att-header">
          <h1 class="att-page-title">Attendance</h1>
          <div class="att-actions" id="attendance-action-row"></div>
        </div>
        <div class="att-card-wrap" id="attendance-auth-root"></div>
      </main>
    </div>
  </div>
</div>

<script src="layout.js"></script>
<script src="attendance_authentication_components.js"></script>
<script src="attendance_kiosk_mode_screen.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento - Salary Scale Table</title>
  <meta name="description" content="Talento HR Platform - Salary scale table view" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="design-tokens.js"></script>

  <style>
    #main-scroll { background: #f6f5f7; }
    .sst-page-wrap { padding: 16px; min-height: calc(100vh - 56px); }
    .sst-shell {
      border: 1px solid #ece9ef;
      border-radius: 16px;
      background: #fff;
      min-height: calc(100vh - 88px);
      padding: 16px;
    }

    .ss-title { margin-bottom: 12px; font-size: 24px; }

    .sst-head-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .sst-tabs {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      border: 1px solid #3623531F;
      border-radius: 10px;
      background: #0E121B05;
      padding: 2px;
    }

    .sst-tab {
      min-height: 30px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #787085;
      font-size: 14px;
      line-height: 1;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .sst-tab.active {
      background: #fff;
      color: #1e1033;
      font-weight: 500;
    }

    .sst-config-btn {
      min-height: 30px;
      border-radius: 10px;
      border: 1px solid #3623531F;
      background: #fff;
      color: #4b405c;
      font-size: 14px;
      line-height: 1;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
    }

    .sst-table-wrap {
      border: 1px solid #3623531F;
      border-radius: 14px;
      background: #fff;
      overflow: hidden;
    }

    .sst-table-scroll { overflow-x: auto; }
    .sst-table {
      width: 100%;
      min-width: 1120px;
      border-collapse: collapse;
    }

    .sst-table thead tr { background: #f3f1f5; }
    .sst-th {
      text-align: left;
      font-size: 14px;
      font-weight: 500;
      color: #625a71;
      padding: 10px 12px;
      border-bottom: 1px solid #3623531F;
      white-space: nowrap;
    }

    .sst-th-sort {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .sst-sort-icon {
      display: inline-block;
      vertical-align: middle;
      margin-left: 3px;
    }

    .sst-table tbody tr { background: #fff; }
    .sst-table tbody tr + tr td { border-top: 1px solid #3623531F; }

    .sst-td {
      padding: 10px 12px;
      font-size: 14px;
      color: #1e1033;
      vertical-align: middle;
    }

    .sst-level-cell {
      display: grid;
      grid-template-columns: 20px minmax(0,1fr);
      gap: 10px;
      align-items: center;
      min-width: 250px;
    }

    .sst-level-dot {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: #23609E;
      flex-shrink: 0;
    }

    .sst-level-name { font-size: 14px; line-height: 1.35; font-weight: 500; margin: 0; }
    .sst-level-code { margin: 2px 0 0; font-size: 12px; line-height: 1.3; color: #8f88a0; }

    .sst-salary { font-size: 14px; font-weight: 500; color: #1e1033; }
    .sst-salary.max { color: #23609E; }

    .sst-allowances {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      white-space: nowrap;
    }

    .sst-chip {
      height: 24px;
      border-radius: 999px;
      padding: 0 10px;
      font-size: 14px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      background: #D7EEFF;
      color: #023553;
    }

    .sst-chip.gray {
      background: #E8E7EB;
      color: #726b81;
    }

    .sst-arrow { color: #7b738a; font-size: 12px; }

    .sst-medical {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      white-space: nowrap;
    }

    .sst-medical.included i { color: #38B291; }
    .sst-medical.not-included i { color: #A59FAD; }
    .sst-medical.not-included { color: #6f6780; }

    .sst-status {
      height: 24px;
      border-radius: 999px;
      padding: 0 10px;
      background: #D7FFE7;
      color: #025326;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      line-height: 1;
    }

    .sst-more-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: #6f6780;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .sst-more-btn:hover { border-color: #e8e3ed; background: #f8f7fb; }

    @media (max-width: 760px) {
      .sst-page-wrap { padding: 12px; }
      .sst-shell { padding: 12px; }
      .sst-head-row { justify-content: flex-start; }
    }
  </style>
</head>

<body>
<div id="app">
  <div id="overlay" aria-hidden="true"></div>
  <aside id="sidebar" aria-label="Main navigation"></aside>
  <div id="main-col">
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;background:#fff;border-bottom:1px solid #e8e7eb;flex-shrink:0;min-width:0;"></header>
    <div id="main-scroll">
      <div class="sst-page-wrap">
        <div class="sst-shell">
          <div id="salary-scale-table-root"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="layout.js"></script>
<script src="salary_scale_components.js"></script>
<script src="salary_scale_table_components.js"></script>
<script src="salary-scale-table-screen.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Talento – Rescheduled Loans</title>
  <meta name="description" content="Talento HR Platform – Rescheduled Loans Management" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Shared layout styles -->
  <link rel="stylesheet" href="shared-styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       RESCHEDULED LOANS PAGE-SPECIFIC STYLES
       ═══════════════════════════════════════════════════════════════════════════ */

    /* ─────────────────────────────────────────
       PAGE HEADER LAYOUT
    ───────────────────────────────────────── */
    .page-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .page-header-left {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .page-header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* ─────────────────────────────────────────
       BREADCRUMB
    ───────────────────────────────────────── */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      color: var(--color-text-muted);
    }

    .breadcrumb a {
      color: var(--color-text-muted);
      text-decoration: none;
      transition: color 150ms;
    }

    .breadcrumb a:hover {
      color: var(--color-text-primary);
    }

    .breadcrumb span {
      color: var(--color-text-primary);
    }

    /* ─────────────────────────────────────────
       PAGE TITLE
    ───────────────────────────────────────── */
    .page-title {
      font-size: 20px;
      font-weight: 500;
      color: var(--color-text-primary);
      letter-spacing: -0.2px;
      line-height: 1.3;
    }

    /* ─────────────────────────────────────────
       PAGINATION NAV (Back X of Y Next)
    ───────────────────────────────────────── */
    .pagination-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--color-text-secondary);
    }

    .pagination-nav button {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0;
      font-size: 13px;
      color: var(--color-text-secondary);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: color 150ms;
    }

    .pagination-nav button:hover {
      color: var(--color-text-primary);
    }

    .pagination-nav button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ─────────────────────────────────────────
       TOOLBAR ROW
    ───────────────────────────────────────── */
    .toolbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      flex: 1;
      min-width: 0;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ─────────────────────────────────────────
       SEARCH BOX (rounded pill style)
    ───────────────────────────────────────── */
    .search-box-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid #e8e7eb;
      border-radius: 100px;
      padding: 0 16px;
      height: 36px;
      min-width: 220px;
      max-width: 320px;
      flex: 1;
    }

    .search-box-pill input {
      border: none;
      background: transparent;
      outline: none;
      font-size: 14px;
      color: var(--color-text-secondary);
      width: 100%;
    }

    .search-box-pill input::placeholder {
      color: #a09aab;
    }

    .search-box-pill svg {
      color: #a09aab;
      flex-shrink: 0;
    }

    /* ─────────────────────────────────────────
       FILTER & EXPORT BUTTONS
    ───────────────────────────────────────── */
    .filter-btn,
    .export-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 34px;
      padding: 0 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--color-text-secondary);
      background: transparent;
      border: 1px solid #e8e7eb;
      cursor: pointer;
      transition: all 150ms;
      white-space: nowrap;
    }

    .filter-btn:hover,
    .export-btn:hover {
      background: #f6f5f7;
    }

    .filter-count {
      color: var(--color-text-muted);
      font-weight: 500;
    }

    /* ─────────────────────────────────────────
       CREATE NEW BUTTON
    ───────────────────────────────────────── */
    .create-new-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      padding: 0 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      background: #1E1033;
      cursor: pointer;
      transition: all 150ms;
      border: none;
      white-space: nowrap;
    }

    .create-new-btn svg {
      color: #2CF7B3;
      stroke: #2CF7B3;
    }

    .create-new-btn:hover {
      background: #2a1745;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(30, 16, 51, 0.25);
    }

    /* ─────────────────────────────────────────
       MORE OPTIONS BUTTON (3 dots)
    ───────────────────────────────────────── */
    .more-options-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid #e8e7eb;
      cursor: pointer;
      transition: all 150ms;
      color: var(--color-text-secondary);
    }

    .more-options-btn:hover {
      background: #f6f5f7;
    }

    /* ─────────────────────────────────────────
       STATUS BADGES (In review, Approved, Rejected)
    ───────────────────────────────────────── */
    .badge-in-review {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 10px;
      border-radius: var(--badge-radius);
      font-size: var(--badge-font-size);
      font-weight: 400;
      color: #b45309;
      background: #fef3c7;
    }

    /* Date range display in table */
    .date-range-cell {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--color-text-secondary);
    }

    .date-range-cell .arrow {
      color: var(--color-text-muted);
    }

    /* ─────────────────────────────────────────
       ACTION MENU BUTTON (vertical dots)
    ───────────────────────────────────────── */
    .action-menu-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--color-text-muted);
      transition: all 150ms;
    }

    .action-menu-btn:hover {
      background: #f6f5f7;
      color: var(--color-text-primary);
    }

    /* ─────────────────────────────────────────
       EMPLOYEE INFO CELL
    ───────────────────────────────────────── */
    .employee-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .employee-name {
      font-size: 14px;
      font-weight: 400;
      color: var(--color-text-primary);
    }

    .employee-role {
      font-size: 12px;
      color: var(--color-text-muted);
    }

    /* ─────────────────────────────────────────
       RESPONSIVE ADJUSTMENTS
    ───────────────────────────────────────── */
    @media (max-width: 768px) {
      .page-header-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .page-header-right {
        width: 100%;
        justify-content: flex-start;
      }

      .toolbar-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .toolbar-left {
        width: 100%;
      }

      .toolbar-right {
        width: 100%;
        justify-content: flex-start;
      }

      .search-box-pill {
        min-width: unset;
        max-width: unset;
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .page-title {
        font-size: 18px;
      }

      .pagination-nav {
        font-size: 12px;
      }

      .create-new-btn {
        height: 32px;
        padding: 0 12px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
<div id="app">

  <!-- OVERLAY (mobile) -->
  <div id="overlay" aria-hidden="true"></div>

  <!-- SIDEBAR (injected by layout.js) -->
  <aside id="sidebar" aria-label="Main navigation"></aside>

  <!-- MAIN COLUMN -->
  <div id="main-col">

    <!-- NAVBAR (injected by layout.js) -->
    <header id="navbar" style="display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 16px;background:#fff;border-bottom:1px solid #e8e7eb;flex-shrink:0;min-width:0;"></header>

    <!-- SCROLL AREA -->
    <div id="main-scroll">
      <div style="padding:16px;background:#f6f5f7;min-height:calc(100vh - 56px);">

        <!-- MAIN CONTENT CARD -->
        <div style="background:#fff;border-radius:20px;padding:20px 20px 24px;display:flex;flex-direction:column;gap:0;min-width:0;overflow:hidden;">

          <!-- PAGE HEADER -->
          <div class="page-header-row">
            <div class="page-header-left">
              <!-- Breadcrumb -->
              <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="#">Loans</a>
                <span>/</span>
                <span>Rescheduled loans</span>
              </nav>
              <!-- Page Title -->
              <h1 class="page-title">Rescheduled loans</h1>
            </div>
            <div class="page-header-right">
              <!-- Pagination Navigation -->
              <div class="pagination-nav">
                <button onclick="prevRecord()" aria-label="Previous record">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                  Back
                </button>
                <span id="pagination-info">1 of 12</span>
                <button onclick="nextRecord()" aria-label="Next record">
                  Next
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
              </div>
              <!-- Create New Button -->
              <button class="create-new-btn" onclick="createNew()">
                Create new
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <!-- More Options -->
              <button class="more-options-btn" aria-label="More options">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
              </button>
            </div>
          </div>

          <!-- TOOLBAR ROW -->
          <div class="toolbar-row">
            <div class="toolbar-left">
              <!-- Search Box -->
              <div class="search-box-pill">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" placeholder="Search" />
              </div>
            </div>
            <div class="toolbar-right">
              <!-- Filters Button -->
              <button class="filter-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
                Filters
                <span class="filter-count">2</span>
              </button>
              <!-- Export All Button -->
              <button class="export-btn">
                Export all
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              </button>
            </div>
          </div>

          <!-- DATA TABLE -->
          <div class="table-container">
            <div class="table-scroll-wrap">
              <table class="data-table">
                <thead>
                  <tr>
                    <th style="width: 40px; padding-left: 14px;">
                      <input type="checkbox" class="table-checkbox" aria-label="Select all" />
                    </th>
                    <th>
                      Employee name
                      <svg class="sort-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#787085" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 10 12 6 16 10"/><polyline points="8 14 12 18 16 14"/></svg>
                    </th>
                    <th>
                      Loan Request
                      <svg class="sort-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#787085" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 10 12 6 16 10"/><polyline points="8 14 12 18 16 14"/></svg>
                    </th>
                    <th>
                      Status
                      <svg class="sort-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#787085" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 10 12 6 16 10"/><polyline points="8 14 12 18 16 14"/></svg>
                    </th>
                    <th>
                      Reason
                      <svg class="sort-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#787085" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 10 12 6 16 10"/><polyline points="8 14 12 18 16 14"/></svg>
                    </th>
                    <th>
                      Changed from→to
                      <svg class="sort-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#787085" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 10 12 6 16 10"/><polyline points="8 14 12 18 16 14"/></svg>
                    </th>
                    <th>Installment amount</th>
                    <th style="width: 50px;"></th>
                  </tr>
                </thead>
                <tbody id="loans-table-body">
                  <!-- Data rows will be rendered by JavaScript -->
                </tbody>
              </table>
            </div>
          </div>

        </div>
        <!-- /MAIN CARD -->

      </div>
    </div>
    <!-- /SCROLL -->

  </div>
  <!-- /MAIN COL -->

</div>

<!-- Shared Layout Script -->
<script src="layout.js"></script>
<!-- Rescheduled Loans Components -->
<script src="rescheduled_loans_components.js"></script>

<!-- Page-specific scripts -->
<script>
// Sample data for rescheduled loans
const rescheduledLoansData = [
  {
    id: 1,
    employeeName: 'Fahad AlShahrani',
    employeeRole: 'Marketing lead',
    employeeAvatar: 'https://i.pravatar.cc/150?img=33',
    loanRequest: '#LAR00358',
    status: 'in-review',
    reason: 'Reschedule Loan Installment...',
    changedFrom: '25 Dec 2025',
    changedTo: '30 Dec 2025',
    installmentAmount: 'SAR 2,000'
  },
  {
    id: 2,
    employeeName: 'Fahad AlShahrani',
    employeeRole: 'Marketing lead',
    employeeAvatar: 'https://i.pravatar.cc/150?img=33',
    loanRequest: '#LAR00358',
    status: 'approved',
    reason: 'Reschedule Loan Installment...',
    changedFrom: '25 Dec 2025',
    changedTo: '30 Dec 2025',
    installmentAmount: 'SAR 2,000'
  },
  {
    id: 3,
    employeeName: 'Fahad AlShahrani',
    employeeRole: 'Marketing lead',
    employeeAvatar: 'https://i.pravatar.cc/150?img=33',
    loanRequest: '#LAR00358',
    status: 'approved',
    reason: 'Reschedule Loan Installment...',
    changedFrom: '25 Dec 2025',
    changedTo: '30 Dec 2025',
    installmentAmount: 'SAR 2,000'
  },
  {
    id: 4,
    employeeName: 'Fahad AlShahrani',
    employeeRole: 'Marketing lead',
    employeeAvatar: 'https://i.pravatar.cc/150?img=33',
    loanRequest: '#LAR00358',
    status: 'rejected',
    reason: 'Reschedule Loan Installment...',
    changedFrom: '25 Dec 2025',
    changedTo: '30 Dec 2025',
    installmentAmount: 'SAR 2,000'
  }
];

// Pagination state
let currentPage = 1;
const totalPages = 12;

// Initialize the page
document.addEventListener('DOMContentLoaded', function() {
  renderTable();
  updatePaginationInfo();
});

// Render table rows
function renderTable() {
  const tbody = document.getElementById('loans-table-body');
  tbody.innerHTML = rescheduledLoansData.map(loan => 
    RescheduledLoansComponents.TableRow(loan)
  ).join('');
}

// Update pagination info
function updatePaginationInfo() {
  document.getElementById('pagination-info').textContent = `${currentPage} of ${totalPages}`;
}

// Navigation functions
function prevRecord() {
  if (currentPage > 1) {
    currentPage--;
    updatePaginationInfo();
  }
}

function nextRecord() {
  if (currentPage < totalPages) {
    currentPage++;
    updatePaginationInfo();
  }
}

function createNew() {
  console.log('Create new rescheduled loan');
}

function showActionMenu(id) {
  console.log('Show action menu for loan:', id);
}
</script>

</body>
</html>
